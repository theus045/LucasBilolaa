<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Sistema de Arsenal Pro</title>
    <link rel="stylesheet" href="body.css">
    <style>
        /* --- ESTILIZAÇÃO DOS NOVOS BOTÕES E LAYOUT --- */
        
        .mental-container {
            position: absolute;
            right: -150px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
        }

        .char-container {
            overflow: visible !important;
        }

        /* Botão de Condições */
        .btn-toggle {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
            color: #ffd700;
            border: 1px solid #ffd700;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-toggle:hover {
            background: #ffd700;
            color: #000;
        }

        .conteudo-condicoes {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            border: 1px dashed #444;
            margin-bottom: 20px;
        }

        /* Botões de Sistema (Resetar e Sair) */
        .sistema-controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-reset, .btn-sair {
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-reset {
            background: #444;
            color: #fff;
            border: 1px solid #666;
        }

        .btn-reset:hover {
            background: #ffd700;
            color: #000;
            border-color: #000;
        }

        .btn-sair {
            background: linear-gradient(135deg, #b32d2d, #7a1a1a);
            color: white;
            box-shadow: 0 4px 10px rgba(179, 45, 45, 0.3);
        }

        .btn-sair:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* Ajuste do Boneco */
        .status-label.mental {
            position: relative;
            left: 0 !important;
            top: 0 !important;
            min-width: 130px;
            border-style: double;
        }
    </style>
</head>
<body>

    <button class="btn-sidebar-toggle btn-mochila" onclick="toggleSidebar('sidebar-mochila')">🎒</button>
    <button class="btn-sidebar-toggle btn-loja" onclick="toggleSidebar('sidebar-loja')">🛒</button>

    <div id="sidebar-mochila" class="sidebar side-left">
        <h3 class="sidebar-titulo">Mochila</h3>
        <div class="tabs-inventario">
            <button onclick="mudarAba('itens')" id="tab-itens" class="active">Itens</button>
            <button onclick="mudarAba('armas')" id="tab-armas">Armas</button>
        </div>
        
        <div id="aba-itens" class="conteudo-aba active">
            <div class="add-item-box">

                <button onclick="adicionarItem()">+</button>
            </div>
            <div id="slots-itens" class="grid-inventario"></div>
        </div>

        <div id="aba-armas" class="conteudo-aba" style="display: none;">
            <div id="slots-armas" class="grid-inventario"></div>
        </div>
    </div>

    <div id="sidebar-loja" class="sidebar side-right">

        <div id="lista-loja" class="loja-lista-vertical"></div>
    </div>

    <div id="main-content">

        </div>
        
        <div class="char-container" id="drop-zone">

            <div id="stat-cabeca" class="status-label" style="top: 20px; left: 110px;">Cab: <span id="v-cabeca">0/0</span><div class="controls"><button onclick="alterarVida('cabeca', 1)">+</button><button onclick="alterarVida('cabeca', -1)">-</button></div></div>
            <div id="stat-torso" class="status-label" style="top: 150px; left: 110px;">Torso: <span id="v-torso">0/0</span><div class="controls"><button onclick="alterarVida('torso', 1)">+</button><button onclick="alterarVida('torso', -1)">-</button></div></div>
            <div id="stat-braco-dir" class="status-label" style="top: 120px; left: 10px;">B.Dir: <span id="v-bracoDir">0/0</span><div class="controls"><button onclick="alterarVida('bracoDir', 1)">+</button><button onclick="alterarVida('bracoDir', -1)">-</button></div></div>
            <div id="stat-braco-esq" class="status-label" style="top: 120px; left: 210px;">B.Esq: <span id="v-bracoEsq">0/0</span><div class="controls"><button onclick="alterarVida('bracoEsq', 1)">+</button><button onclick="alterarVida('bracoEsq', -1)">-</button></div></div>
            <div id="stat-perna-dir" class="status-label" style="top: 350px; left: 60px;">P.Dir: <span id="v-pernaDir">0/0</span><div class="controls"><button onclick="alterarVida('pernaDir', 1)">+</button><button onclick="alterarVida('pernaDir', -1)">-</button></div></div>

            <div class="mental-container">

                <div id="stat-stress" class="status-label mental">Str: <span id="v-stress">0/0</span><div class="controls"><button onclick="alterarMental('stress', 1)">+</button><button onclick="alterarMental('stress', -1)">-</button></div></div>
                <div id="stat-consciencia" class="status-label mental">Con: <span id="v-consciencia">0/0</span><div class="controls"><button onclick="alterarMental('consciencia', 1)">+</button><button onclick="alterarMental('consciencia', -1)">-</button></div></div>
            </div>
        </div>

        <div class="painel-condicoes">
            <button onclick="toggleCondicoes()" class="btn-toggle">⚠️ Condições de Status</button>
            <div id="lista-condicoes" class="conteudo-condicoes">

        </div>

        <div class="sistema-controls">
            <button class="btn-reset" onclick="resetarPosicoes()">Resetar Posições</button>
            <button class="btn-sair" onclick="sair()">Sair do Sistema</button>
        </div>
    </div>

        // CORREÇÃO: Recuperação segura que nunca assume que todos os objetos aninhados existem
        let dadosCarregados = JSON.parse(localStorage.getItem(usuarioLogado));
        
        let dados = dadosCarregados || {};
        
        // Assegurar fallback seguro para arrays e objetos essenciais
        if (!dados.dinheiro && dados.dinheiro !== 0) dados.dinheiro = 0;
        if (!dados.inventario) dados.inventario = [];
        if (!dados.armasCompradas) dados.armasCompradas = [];
        if (!dados.vidaCorpo) dados.vidaCorpo = { cabeca:{atual:12, max:12}, torso:{atual:25, max:25}, bracoDir:{atual:15, max:15}, bracoEsq:{atual:15, max:15}, pernaDir:{atual:15, max:15}, pernaEsq:{atual:15, max:15} };
        if (!dados.statusMentais) dados.statusMentais = { sanidade:{atual:20, max:20}, stress:{atual:0, max:20}, consciencia:{atual:15, max:15} };

        function salvar() { localStorage.setItem(usuarioLogado, JSON.stringify(dados)); }

        function atualizarTela() {
            document.getElementById('nome-player').innerText = usuarioLogado;
            document.getElementById('v-dinheiro').innerText = dados.dinheiro;
            
            const categorias = [dados.vidaCorpo, dados.statusMentais];
            categorias.forEach(cat => {
                for (let chave in cat) {
                    const p = cat[chave];
                    const span = document.getElementById(`v-${chave}`);
                    if (span) {
                        span.innerText = `${p.atual}/${p.max}`;
                        const label = span.closest('.status-label');
                        label.style.borderColor = (p.atual/p.max > 0.6) ? '#4caf50' : (p.atual/p.max > 0.3) ? '#ffeb3b' : '#f44336';
                    }
                }
            });
            renderizarLoja();
            renderizarInventario();
        }

        let classeAtual = "";

function renderizarLoja(filtro = "") {
    const container = document.getElementById('lista-loja');
    container.innerHTML = "";

    DB_ARMAS
    .filter(a => a.nome.toLowerCase().includes(filtro.toLowerCase()))
    .filter(a => classeAtual === "" || a.classe === classeAtual)
    .forEach(arma => {

        const div = document.createElement('div');
        div.className = "item-loja-v";

        div.innerHTML = `
            <div class="loja-info">
                <div class="tooltip"><strong>${arma.nome}</strong>
                    <span class="tooltiptext">
                        Classe: ${arma.classe}<br>
                        Dano: ${arma.dano}<br>
                        ${arma.hab}
                    </span>
                </div>
                <span class="preco-tag">$${arma.preco}</span>
            </div>
            <button onclick="comprarItem('${arma.nome}')">Comprar</button>
        `;

        container.appendChild(div);
    });
}

        function filtrarClasse(classe) {
    classeAtual = classe;
    renderizarLoja(document.getElementById('busca-loja').value);
}
        
        function comprarItem(nomeArma) {
            const arma = DB_ARMAS.find(a => a.nome === nomeArma);
            if (dados.dinheiro >= arma.preco) {
                dados.dinheiro -= arma.preco;
                dados.armasCompradas.push({ ...arma, id: "arma-" + Date.now(), tipo: 'arma-rpg' });
                salvar();
                atualizarTela();
            } else { alert("Sem saldo!"); }
        }

        function renderizarInventario() {
            const sItens = document.getElementById('slots-itens');
            const sArmas = document.getElementById('slots-armas');
            sItens.innerHTML = ""; sArmas.innerHTML = "";

            dados.inventario.forEach(item => sItens.appendChild(criarElemento(item, 'item-rpg')));
            dados.armasCompradas.forEach(arma => sArmas.appendChild(criarElemento(arma, 'arma-rpg')));

            document.querySelectorAll('.status-label').forEach(configurarArraste);
        }

        function criarElemento(item, classe) {
            const div = document.createElement('div');
            div.id = item.id;
            div.className = `status-label ${classe}`;
            
            // Se for uma Arma de RPG e tiver atributos, cria com Tooltip embutido
            if (classe === 'arma-rpg' && item.hab) {
                div.innerHTML = `
                    <div class="tooltip">${item.nome}
                        <span class="tooltiptext">
                            <strong>Dano:</strong> ${item.dano}<br>
                            <strong>Efeito:</strong> ${item.hab}
                        </span>
                    </div>
                    <span onclick="remover('${item.id}', '${classe}')" class="del-btn">✖</span>
                `;
            } else {
                // Se for um item comum (sem atributos), cria normalmente
                div.innerHTML = `${item.nome} <span onclick="remover('${item.id}', '${classe}')" class="del-btn">✖</span>`;
            }
            
            return div;
        }

        function remover(id, classe) {
            if (classe === 'arma-rpg') {
                dados.armasCompradas = dados.armasCompradas.filter(a => a.id !== id);
            } else {
                dados.inventario = dados.inventario.filter(i => i.id !== id);
            }
            localStorage.removeItem(`pos_${id}_${usuarioLogado}`);
            salvar();
            atualizarTela();
        }

        function configurarArraste(label) {
            if (label.classList.contains('mental')) return;

            const pos = JSON.parse(localStorage.getItem(`pos_${label.id}_${usuarioLogado}`));
            if (pos) { 
                label.style.left = pos.x + 'px'; 
                label.style.top = pos.y + 'px'; 
                label.style.position = 'absolute';
                document.getElementById('drop-zone').appendChild(label);
            }

            label.onmousedown = function(e) {
                if (e.target.classList.contains('del-btn') || e.target.tagName === 'BUTTON') return;
                const container = document.getElementById('drop-zone');
                const rect = container.getBoundingClientRect();
                let sX = e.clientX - label.getBoundingClientRect().left;
                let sY = e.clientY - label.getBoundingClientRect().top;
                label.style.position = 'absolute';
                container.appendChild(label);
                function move(ev) {
                    label.style.left = (ev.clientX - rect.left - sX) + 'px';
                    label.style.top = (ev.clientY - rect.top - sY) + 'px';
                }
                document.onmousemove = move;
                document.onmouseup = function() {
                    document.onmousemove = null;
                    localStorage.setItem(`pos_${label.id}_${usuarioLogado}`, JSON.stringify({
                        x: parseInt(label.style.left), y: parseInt(label.style.top)
                    }));
                };
            };
        }

        function toggleSidebar(id) {
            const sb = document.getElementById(id);
            const aberta = sb.classList.contains('aberta');
            document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('aberta'));
            if (!aberta) sb.classList.add('aberta');
        }

        function mudarAba(aba) {
            document.getElementById('aba-itens').style.display = aba === 'itens' ? 'block' : 'none';
            document.getElementById('aba-armas').style.display = aba === 'armas' ? 'block' : 'none';
            document.getElementById('tab-itens').classList.toggle('active', aba === 'itens');
            document.getElementById('tab-armas').classList.toggle('active', aba === 'armas');
        }

        function filtrarLoja() { renderizarLoja(document.getElementById('busca-loja').value); }
        
        // CORREÇÃO: Clamp (trava) para não bloquear curas que estourariam o máximo e não permitir HP negativo
        function alterarVida(p, v) { 
            let x = dados.vidaCorpo[p]; 
            x.atual += v;
            if (x.atual < 0) x.atual = 0;
            if (x.atual > x.max) x.atual = x.max;
            salvar(); 
            atualizarTela(); 
        }

        function alterarMental(t, v) { 
            let x = dados.statusMentais[t]; 
            x.atual += v;
            if (x.atual < 0) x.atual = 0;
            if (x.atual > x.max) x.atual = x.max;
            salvar(); 
            atualizarTela(); 
        }

        function alterarDinheiro(s) { 
            const q = parseInt(document.getElementById('input-qtd-dinheiro').value) || 0; 
            if(dados.dinheiro + (q*s) >= 0) { 
                dados.dinheiro += (q*s); 
                salvar(); 
                atualizarTela(); 
            }
        }

        function adicionarItem() { 
            const n = document.getElementById('novo-item-nome'); 
            if(!n.value) return; 
            dados.inventario.push({id: "it-"+Date.now(), nome: n.value, tipo: 'item-rpg'}); 
            n.value = ""; 
            salvar(); 
            atualizarTela(); 
        }

        // CORREÇÃO: Usa getComputedStyle para funcionar perfeitamente desde o primeiro clique
        function toggleCondicoes() { 
            const list = document.getElementById('lista-condicoes'); 
            const isHidden = window.getComputedStyle(list).display === 'none';
            list.style.display = isHidden ? 'flex' : 'none'; 
        }

        // CORREÇÃO: Apaga apenas as posições do usuário atual para não atrapalhar outros saves
        function resetarPosicoes() { 
            Object.keys(localStorage).forEach(k => { 
                if(k.startsWith('pos_') && k.endsWith('_' + usuarioLogado)) {
                    localStorage.removeItem(k); 
                }
            }); 
            location.reload(); 
        }

        function sair() { sessionStorage.clear(); window.location.href = 'index.html'; }
        
     window.onload = function() {
           atualizarTela();
      };
    </script>
